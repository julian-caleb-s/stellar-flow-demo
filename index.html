<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Settlement Demo</title>
    <style>
        :root {
            --primary: #5025B8;
            --secondary: #3D1C8C;
            --accent: #D5C2FF;
            --bg-dark: #0F0F12;
            --card-bg: #18181D;
            --text-light: #E4E4E4;
            --transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 10%;
            padding: 0 2rem;
            background: rgba(15, 15, 18, 0.95);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }

        .header-info h1 {
            font-size: 1.1rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .progress-container {
            display: flex;
            gap: 10px;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #333;
            transition: var(--transition);
        }

        .step-dot.active {
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent);
        }

        main {
            flex: 1;
            display: flex;
            height: 72%;
        }

        .simulation-panel {
            flex: 1.6;
            position: relative;
            background: radial-gradient(circle at center, #1a1a20 0%, #0f0f12 100%);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 1rem;
        }

        .explanation-panel {
            flex: 1;
            background: var(--card-bg);
            padding: 2rem;
            border-left: 1px solid #222;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .node {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
            transition: var(--transition);
        }

        .bank-icon {
            width: 70px;
            height: 70px;
            background: var(--secondary);
            border: 1px solid var(--primary);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }

        .bank-label {
            font-weight: 500;
            font-size: 0.75rem;
            text-align: center;
            opacity: 0.7;
        }

        .stellar-core {
            width: 60px;
            height: 60px;
            background: rgba(80, 37, 184, 0.15);
            border: 1px dashed var(--primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .stellar-logo {
            width: 24px;
            fill: var(--accent);
        }

        .token {
            position: absolute;
            width: 44px;
            height: 44px;
            background: var(--accent);
            color: var(--secondary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            font-size: 0.7rem;
            box-shadow: 0 0 25px rgba(213, 194, 255, 0.5);
            opacity: 0;
            z-index: 10;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: left 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s, transform 0.4s;
        }

        .explanation-content h2 {
            color: var(--accent);
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .explanation-content p {
            line-height: 1.6;
            font-size: 1rem;
            color: #aaa;
        }

        footer {
            height: 18%;
            padding: 1.5rem;
            background: #121216;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            border-top: 1px solid #222;
        }

        button {
            padding: 14px 30px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
            transition: var(--transition);
        }

        .btn-next { background: var(--primary); color: white; }
        .btn-next:hover { background: #6332da; }
        
        .btn-restart { 
            background: transparent; 
            color: var(--accent); 
            border: 1px solid var(--accent); 
        }
        .btn-restart:hover { 
            color: #666; 
            border-color: #333; 
        }

        .active-node .bank-icon, .active-node .stellar-core {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(80, 37, 184, 0.4);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0px var(--accent); }
            50% { transform: scale(1.1); box-shadow: 0 0 20px var(--accent); }
            100% { transform: scale(1); box-shadow: 0 0 0px var(--accent); }
        }
        .processing .stellar-core { animation: pulse 1.5s infinite; border-style: solid; }

        @media (max-width: 768px) {
            .progress-container { display: none; }
            main { flex-direction: column; }
            .simulation-panel { flex: 1.2; }
            .explanation-panel { flex: 1; border-left: none; border-top: 1px solid #222; padding: 1.5rem; }
            footer { flex-direction: column; height: 25%; }
            button { width: 100%; }
            .bank-icon { width: 55px; height: 55px; }
            .stellar-core { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-info">
            <h1>Cross-Border Settlement</h1>
        </div>
        <div class="progress-container" id="dots"></div>
    </header>

    <main>
        <section class="simulation-panel" id="stage">
            <div class="node" id="bank-a">
                <div class="bank-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 1L2 6v2h20V6L12 1zm10 19H2v2h20v-2zM5 9h3v9H5V9zm6 0h3v9h-3V9zm6 0h3v9h-3V9z"/></svg>
                </div>
                <div class="bank-label">Bank A (USA)</div>
            </div>

            <div class="node" id="stellar-network">
                <div class="stellar-core">
                    <svg class="stellar-logo" viewBox="0 0 24 24"><path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z"/></svg>
                </div>
                <div class="bank-label">Stellar</div>
            </div>

            <div class="node" id="bank-b">
                <div class="bank-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 1L2 6v2h20V6L12 1zm10 19H2v2h20v-2zM5 9h3v9H5V9zm6 0h3v9h-3V9zm6 0h3v9h-3V9z"/></svg>
                </div>
                <div class="bank-label">Bank B (EU)</div>
            </div>

            <div id="token" class="token">USD</div>
        </section>

        <section class="explanation-panel">
            <div class="explanation-content">
                <h2 id="title">Ready to Start</h2>
                <p id="desc">Experience how the Stellar network bridges global currencies in seconds.</p>
            </div>
        </section>
    </main>

    <footer>
        <button class="btn-restart" onclick="reset()">Reset</button>
        <button class="btn-next" id="next" onclick="next()">Start Demo</button>
    </footer>

    <script>
        const steps = [
            {
                t: "1. Initiation",
                d: "A USD payment is triggered. In the legacy world, this marks the start of a multi-day journey through intermediary banks.",
                h: "bank-a", pos: "20%", label: "USD", pulse: false, immediate: true
            },
            {
                t: "2. Tokenization",
                d: "The US bank issues a digital representation of the USD onto the Stellar ledger, making the capital 'programmable'.",
                h: "bank-a", pos: "20%", label: "USD", pulse: false, immediate: false
            },
            {
                t: "3. FX Routing",
                d: "Stellar's path-payment automatically finds the best exchange rate. The token slides into the network to be swapped.",
                h: "stellar-network", pos: "50%", label: "FX...", pulse: true, immediate: false
            },
            {
                t: "4. Settlement",
                d: "The ledger validates the swap. USD is exchanged for EUR instantly. No correspondent bank delays or manual reconciliation.",
                h: "stellar-network", pos: "50%", label: "EUR", pulse: true, immediate: false
            },
            {
                t: "5. Redemption",
                d: "The EUR token moves to the European bank. Settlement is final, and funds are ready for the end recipient.",
                h: "bank-b", pos: "80%", label: "EUR", pulse: false, immediate: false
            }
        ];

        let idx = -1;

        const dots = document.getElementById('dots');
        steps.forEach(() => {
            const d = document.createElement('div');
            d.className = 'step-dot';
            dots.appendChild(d);
        });

        function update() {
            const s = steps[idx];
            const t = document.getElementById('token');
            const n = document.getElementById('stellar-network');
            
            document.getElementById('title').textContent = s.t;
            document.getElementById('desc').textContent = s.d;
            
            document.querySelectorAll('.step-dot').forEach((d, i) => d.classList.toggle('active', i <= idx));
            document.querySelectorAll('.node').forEach(node => node.classList.remove('active-node'));
            document.getElementById(s.h).classList.add('active-node');

            if (s.immediate) {
                t.style.transition = 'none';
                t.style.opacity = "1";
                t.style.left = s.pos;
                setTimeout(() => { t.style.transition = ''; }, 50);
            } else {
                t.style.opacity = "1";
                t.style.left = s.pos;
            }
            
            t.textContent = s.label;
            t.style.transform = `translate(-50%, -50%) scale(${s.pulse ? 0.9 : 1})`;

            n.classList.toggle('processing', s.pulse);

            const btn = document.getElementById('next');
            if (idx === steps.length - 1) {
                btn.textContent = "Complete";
                btn.style.opacity = "0.5";
                btn.disabled = true;
            } else {
                btn.textContent = "Next Step";
                btn.disabled = false;
            }
        }

        function next() {
            if (idx < steps.length - 1) {
                idx++;
                update();
            }
        }

        function reset() {
            idx = 0;
            update();
        }
    </script>
</body>
</html>
